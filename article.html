    content: `<p>The destruction of the Nord Stream pipelines in September 2022 sent shockwaves through European capitals — not just because of the immediate energy consequences, but because it revealed how exposed critical undersea infrastructure truly is.</p>

<h2>The Scale of Exposure</h2>
<p>Europe relies on a vast network of subsea assets: over <strong>1.2 million kilometres</strong> of submarine cables carry approximately 97% of intercontinental internet traffic, while dozens of gas and power interconnectors underpin energy supply across the continent. Add to this offshore wind farm cables, oil and gas pipelines, and military communication lines, and the picture of vulnerability becomes acute.</p>

<p>The EU's Critical Entities Resilience Directive (CER) came into force in January 2023 and applies to operators of critical infrastructure in eleven sectors — including energy, digital infrastructure, and maritime transport. However, <em>subsea infrastructure specifically</em> occupies a grey zone between the CER and the Network and Information Security (NIS2) Directive, with classification rules that vary by member state.</p>

</ul>

    content: `<p>European external trade remains overwhelmingly seaborne. According to Eurostat, over 90% of the continent's goods imports and exports travel by ship — a dependency that has historically been taken for granted, but which now faces a confluence of structural pressures that policymakers can no longer ignore.</p>

<h2>Three Fault Lines</h2>
<p>The Blue Economy Report 2026 identifies three interlocking fault lines reshaping European shipping:</p>

<p>The Suez Canal disruption of 2024 — when Houthi attacks in the Red Sea forced rerouting around the Cape of Good Hope — added an average of <strong>twelve days and $1.3 million per voyage</strong> to Asia-Europe routes. This was not a novel risk but a long-telegraphed vulnerability that the industry had underinvested in managing.</p>

<h3>2. Port Capacity Misallocation</h3>
<p>Europe's major container ports — Rotterdam, Antwerp-Bruges, Hamburg — are operating near capacity, while mid-tier ports in the Mediterranean and Baltic sit underutilised. The bottleneck is not berths but hinterland rail and road connectivity, which falls outside the remit of port authorities and into the costly intersection of national infrastructure policy.</p>

<h3>3. The Green Transition Cost Gap</h3>
<p>The IMO's revised GHG strategy targets net-zero shipping by or around 2050. The fuel transition — from HSFO to LNG, methanol, ammonia or hydrogen — requires massive investment in both vessel technology and bunkering infrastructure. Current EU state-aid rules create uneven playing fields for operators trying to front-load that investment.</p>

<h2>What Comes Next</h2>
<p>The forthcoming revision of the TEN-T regulation offers a structural opportunity to integrate maritime and inland connectivity planning. Maritime Affairs recommends that the next European Commission mandate a dedicated <em>Blue Corridors</em> chapter within TEN-T — one that links port masterplans to rail electrification timelines and hydrogen bunkering deployment schedules.</p>`,

    content: `<p>When the autonomous container vessel <em>Yara Birkeland</em> completed its first fully unmanned voyage in Norwegian waters in 2022, it was widely treated as a proof-of-concept curiosity. Four years later, AI-assisted operations are routine in European maritime trade — and the regulatory framework is struggling to keep up.</p>

<p><strong>Traffic management</strong> — The Port of Rotterdam's PortXchange platform uses AI to optimise berth allocation, tidal window scheduling and pilotage demand in real time. The system reduced average port call duration by 14% in its first full year of operation.</p>

    content: `<p>Two significant regulatory instruments are reshaping the compliance landscape for European port operators in 2026: the revised Port Services Regulation (PSR II) and the full rollout of the European Maritime Single Window environment (EMSWe).</p><h2>Port Services Regulation II</h2><p>The revised PSR enters application in July 2026 and introduces mandatory transparency requirements for port dues, expanded rules on port service concessions, and new social provisions covering port workers engaged in digitalised operations. For mid-sized port authorities, the administrative burden is significant — particularly the obligation to publish detailed cost-benchmarking data that competitors can access.</p><h2>The Single Window Rollout</h2><p>EMSWe harmonises the reporting formalities for ships arriving in and departing from EU ports into a single digital entry point. In theory, this eliminates the patchwork of national reporting systems that has long frustrated operators running multi-port rotations. In practice, implementation has been uneven — with several member states still operating parallel national systems.</p><blockquote><p>"Harmonisation on paper is not harmonisation in practice. Until every port accepts EMSWe data, the operational friction remains."</p></blockquote><p>Maritime Affairs is monitoring EMSWe rollout across all 23 coastal member states and will publish a compliance tracker in Q3 2026.</p>`,

    content: `<p>The North Sea Energy Cooperation — a political declaration signed by nine countries in 2016 — has evolved from an aspiration into an active investment programme. By 2030, the nine signatories have committed to 120 GW of offshore wind capacity. By 2050, projections suggest the North Sea alone could host over 300 GW.</p><h2>The Grid Integration Problem</h2><p>Offshore wind capacity is being built faster than the onshore grid can absorb it. In Germany, curtailment costs — payments to wind farms to switch off when the grid cannot accept their output — exceeded €1.2 billion in 2025. The solution is offshore grid interconnection: building DC transmission links directly between wind farms and multiple national grids, so excess generation in Danish waters can flow to French or German demand.</p><h2>Seabed-Use Conflicts</h2><p>The North Sea is already the most intensively used sea basin in the world — traversed by shipping lanes, dotted with oil and gas infrastructure, crossed by submarine cables, and now increasingly occupied by wind farm footprints. Spatial conflicts are multiplying.</p><blockquote><p>"Offshore wind developers and shipping operators are competing for the same seabed. Without coordinated maritime spatial planning, neither industry wins."</p></blockquote><p>Maritime Affairs supports the establishment of an EU-level North Sea Coordination Office with binding maritime spatial planning authority — analogous to the role played by national transmission system operators in onshore energy.</p>`,

    content: `<p>The Scientific, Technical and Economic Committee for Fisheries (STECF) published its 2025 Mediterranean stock assessment in December. The findings are bleak: 62% of assessed stocks remain fished above maximum sustainable yield (MSY), down only marginally from the 65% recorded in 2020.</p><h2>Why Multiannual Plans Are Not Enough</h2><p>The Western Mediterranean Multiannual Plan (WEMAP), in force since 2019, set binding fishing effort reductions for demersal species. Compliance has been partial at best. Days-at-sea limits have been applied inconsistently across Spain, France and Italy, with each country applying different derogations for small-scale fisheries.</p><h2>The Enforcement Gap</h2><p>EFCA, the European Fisheries Control Agency, has limited operational capacity relative to the size of the basin. Joint deployment plans cover priority fisheries but cannot provide continuous surveillance. AIS spoofing — manipulation of vessel tracking transponders — remains a documented and insufficiently penalised practice.</p><blockquote><p>"You cannot manage what you cannot monitor. The Mediterranean needs a surveillance architecture commensurate with its economic and ecological importance."</p></blockquote><h2>A Credible Path Forward</h2><p>Maritime Affairs recommends a dedicated Mediterranean Fisheries Monitoring Centre, drawing on Copernicus satellite data, drone surveillance capacity, and a harmonised vessel monitoring database accessible to all coastal member states in real time.</p>`,

      <div class="art-hero-body">
        <div class="art-breadcrumb">
          <a href="publications.html">Publications</a>
          <span>›</span>
          <span style="color:rgba(255,255,255,.45);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:300px">${escHtml(a.title)}</span>
        </div>
        <div class="art-unit-badge">${escHtml(a.unit || 'General')}</div>
        <h1>${escHtml(a.title)}</h1>
        <div class="art-hero-meta">
          <strong>${escHtml(a.author || 'Maritime Affairs')}</strong>
          <span class="art-meta-sep">·</span>
          <span>${fmtDate(a.published_at)}</span>
          <span class="art-meta-sep">·</span>
          <span>${a.read_min || '—'} min read</span>
        </div>
      </div>
    </section>

    <article class="art-body">
      <div class="art-body-inner">
        <a href="publications.html" class="art-back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back to publications
        </a>
        <div class="art-content">${a.content || '<p>' + escHtml(a.summary) + '</p>'}</div>
      </div>
    </article>

    <section class="art-related">
      <div class="art-related-inner">
        <h3>More from <em>Maritime Affairs</em></h3>
        <div class="related-grid" id="related-grid"></div>
      </div>
    </section>`;

  loadRelated(a);
}

async function loadRelated(current) {
  let articles = [];
  if (isConfigured) {
    const { data } = await sb.from('articles').select('id,slug,title,image_url,unit,published_at').neq('id', current.id).limit(3);
    articles = data || [];
  }
  if (!articles.length) {
    articles = SAMPLE_ARTICLES.filter(a => a.id !== current.id).slice(0, 3);
  }
  const grid = document.getElementById('related-grid');
  if (!grid) return;
  grid.innerHTML = articles.map(a => `
    <article class="pub-card" onclick="location.href='article.html?id=${a.slug || a.id}'">
      <div class="pub-card-img">
        ${a.image_url ? `<img src="${a.image_url}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'pub-card-ph\\'></div>'">` : `<div class="pub-card-ph"></div>`}
      </div>
      <div class="pub-card-body">
        <div style="color:var(--gold); font-family:var(--ff-c); font-size:0.65rem; text-transform:uppercase; letter-spacing:0.18em; margin-bottom:1rem;">${escHtml(a.unit || 'Maritime Affairs')}</div>
        <h3>${escHtml(a.title)}</h3>
        ${a.summary ? `<p>${escHtml(a.summary)}</p>` : ''}
        <div style="margin-top:2rem; font-size:0.7rem; opacity:0.4; font-family:var(--ff-c); letter-spacing:0.12em; text-transform:uppercase">
          ${fmtDate(a.published_at) || 'Undated'}${a.read_min ? ' &nbsp;·&nbsp; ' + a.read_min + ' min' : ''}
        </div>
      </div>
    </article>`).join('');
}

function showError() {
  document.getElementById('page-root').innerHTML = `
    <div class="art-error">
      <h2>Article not found</h2>
      <p>This article may have been moved or removed.</p>
      <a href="publications.html">← Back to publications</a>
    </div>`;
}

function initScroll() {
  const bar = document.getElementById('read-progress');
  window.addEventListener('scroll', () => {
    const h = document.documentElement;
    bar.style.transform = `scaleX(${h.scrollTop / (h.scrollHeight - h.clientHeight)})`;
  }, { passive: true });
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
}
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadArticle();
</script>
<script src="js/main.js"></script>
</body>
</html>
