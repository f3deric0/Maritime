<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Maritime Affairs — WOW Hero Demo</title>
<link rel="icon" href="./assets/images/Logo-maritimes.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#c8913a; --gold-l:#e8b870; --ink:#050c15; --deep:#091524;
  --ocean:#0d3a54; --steel:#1a5f7a; --white:#fff;
  --ff-d:'Cormorant Garamond',serif;
  --ff-c:'Barlow Condensed',sans-serif;
  --ff-b:'Barlow',sans-serif;
  --ff-m:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--ink);color:var(--white);font-family:var(--ff-b);overflow:hidden}
button{font-family:inherit;cursor:pointer}

/* HERO STAGE */
.stage{position:fixed;inset:0;overflow:hidden;background:var(--ink)}
.stage canvas,.stage svg.bg{position:absolute;inset:0;width:100%;height:100%}

/* SHARED CHROME */
.eyebrow{
  font-family:var(--ff-c);font-size:.72rem;font-weight:600;
  letter-spacing:.32em;text-transform:uppercase;color:var(--gold);
  display:inline-flex;align-items:center;gap:.7rem
}
.eyebrow::before{content:'';width:28px;height:1px;background:var(--gold)}
.title{
  font-family:var(--ff-d);font-weight:300;line-height:.86;letter-spacing:-.02em;
  font-size:clamp(4rem,12vw,12rem);
}
.title em{font-style:italic;color:var(--gold);font-weight:400}
.sub{
  font-family:var(--ff-b);font-weight:300;font-size:clamp(1.05rem,1.25vw,1.2rem);
  line-height:1.7;color:rgba(255,255,255,.62);max-width:520px
}
.actions{display:flex;gap:1rem;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;gap:.6rem;
  padding:.95rem 1.6rem;border-radius:2px;
  font-family:var(--ff-c);font-size:.78rem;font-weight:600;
  letter-spacing:.2em;text-transform:uppercase;text-decoration:none;
  transition:transform .3s, background .3s, color .3s, border-color .3s
}
.btn-gold{background:var(--gold);color:var(--ink);border:1px solid var(--gold)}
.btn-gold:hover{background:transparent;color:var(--gold);transform:translateY(-2px)}
.btn-line{background:transparent;color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.18)}
.btn-line:hover{border-color:var(--gold);color:var(--gold)}

/* HUD */
.hud{position:fixed;font-family:var(--ff-m);font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(200,145,58,.55);z-index:5;pointer-events:none}
.hud-tl{top:1.6rem;left:1.6rem}
.hud-tr{top:1.6rem;right:1.6rem;text-align:right}
.hud-bl{bottom:1.6rem;left:1.6rem}
.hud-br{bottom:1.6rem;right:1.6rem;text-align:right}
.hud .v{color:rgba(255,255,255,.85)}

/* CONTENT BLOCK shared */
.content{position:absolute;z-index:3;pointer-events:auto}

/* ============ TREATMENT 1 — SONAR ============ */
.t-sonar .content{left:6vw;top:50%;transform:translateY(-50%);max-width:640px}
.t-sonar .title{color:#fff;text-shadow:0 0 60px rgba(0,0,0,.45)}
.sonar-stats{
  position:absolute;right:6vw;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:1.6rem;z-index:3;
  font-family:var(--ff-m);font-size:.7rem;color:rgba(200,145,58,.7);
  letter-spacing:.14em;text-transform:uppercase;text-align:right
}
.sonar-stats .row{display:flex;justify-content:flex-end;align-items:baseline;gap:1rem;border-right:1px solid rgba(200,145,58,.25);padding-right:1rem}
.sonar-stats .num{font-family:var(--ff-d);font-style:italic;font-size:2.4rem;color:#fff;letter-spacing:0;line-height:1;font-weight:300}

/* ============ TREATMENT 2 — BATHYMETRIC ============ */
.t-bathy .content{left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;max-width:80vw}
.t-bathy .title{font-size:clamp(5rem,16vw,16rem);mix-blend-mode:screen}
.t-bathy .sub{margin:2rem auto 2.4rem}
.t-bathy .actions{justify-content:center}

/* ============ TREATMENT 3 — CONSTELLATION ============ */
.t-const .content{left:6vw;top:50%;transform:translateY(-50%);max-width:560px}
.t-const .legend{
  position:absolute;right:6vw;bottom:6vw;
  font-family:var(--ff-m);font-size:.65rem;color:rgba(255,255,255,.5);
  letter-spacing:.16em;text-transform:uppercase;line-height:2;z-index:3
}
.t-const .legend span{color:var(--gold)}
.t-const .legend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--gold);margin-right:8px;box-shadow:0 0 12px var(--gold)}

/* ============ TREATMENT 4 — LIQUID ============ */
.t-liquid .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 6vw}
.t-liquid .title{font-size:clamp(5rem,17vw,18rem);filter:url(#ripple)}
.t-liquid .sub{margin:2rem auto 2.4rem}
.t-liquid .actions{justify-content:center}
.t-liquid .marquee{
  position:absolute;left:0;right:0;bottom:1.4rem;
  display:flex;gap:3rem;
  font-family:var(--ff-c);font-size:.72rem;letter-spacing:.4em;
  text-transform:uppercase;color:rgba(200,145,58,.6);
  white-space:nowrap;animation:slide 40s linear infinite
}
@keyframes slide{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* TREATMENT SWITCHER (mini) */
.switcher{
  position:fixed;left:50%;bottom:1.6rem;transform:translateX(-50%);z-index:50;
  display:flex;gap:.4rem;padding:.5rem;border-radius:100px;
  background:rgba(5,12,21,.7);backdrop-filter:blur(20px);
  border:1px solid rgba(200,145,58,.18)
}
.switcher button{
  appearance:none;border:none;background:transparent;
  font-family:var(--ff-c);font-size:.66rem;font-weight:600;
  letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);
  padding:.55rem 1.1rem;border-radius:100px;transition:.25s
}
.switcher button:hover{color:#fff}
.switcher button.on{background:var(--gold);color:var(--ink)}

/* INTRO ANIMATIONS */
.fade-up{opacity:0;transform:translateY(28px);animation:fu .9s cubic-bezier(.16,1,.3,1) .15s forwards}
.fade-up.d2{animation-delay:.35s}
.fade-up.d3{animation-delay:.55s}
.fade-up.d4{animation-delay:.75s}
@keyframes fu{to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- SVG filter for liquid ripple -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="ripple">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.018" numOctaves="2" seed="3">
        <animate attributeName="baseFrequency" dur="14s" values="0.012 0.018;0.018 0.012;0.012 0.018" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" scale="14"/>
    </filter>
  </defs>
</svg>

<div class="stage" id="stage"></div>

<!-- HUD corners -->
<div class="hud hud-tl">Maritime Affairs<br><span class="v" id="hud-mode">SONAR · v.01</span></div>
<div class="hud hud-tr">48°51′N · 002°21′E<br><span class="v">Brussels — EU NGO</span></div>
<div class="hud hud-bl">EU TRANSPARENCY REGISTER<br><span class="v" id="hud-clock">--:--:-- UTC</span></div>
<div class="hud hud-br">Blue Century<br><span class="v">2026 · Founded 2023</span></div>

<!-- Switcher -->
<div class="switcher" id="switcher">
  <button data-t="sonar" class="on">Sonar</button>
  <button data-t="bathy">Bathymetric</button>
  <button data-t="const">Constellation</button>
  <button data-t="liquid">Liquid Type</button>
</div>

<script type="text/babel" src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script>
/* =========================================================
   TREATMENT MARKUP (rendered on demand)
   ========================================================= */
const stage = document.getElementById('stage');
const hudMode = document.getElementById('hud-mode');

const COMMON_CONTENT = (cls) => `
  <div class="content">
    <div class="eyebrow fade-up">EU Blue Economy Do-Tank</div>
    <h1 class="title fade-up d2" style="margin-top:1.8rem">Maritime<br><em>Affairs</em></h1>
    <p class="sub fade-up d3" style="margin-top:1.8rem">
      Connecting <strong style="color:#fff;font-weight:500">policy, industry</strong> and society
      across Europe's seas — from shipping and logistics to blue security and offshore energy.
    </p>
    <div class="actions fade-up d4" style="margin-top:2.2rem">
      <a href="index.html#mission" class="btn btn-gold">Discover our work →</a>
      <a href="publications.html" class="btn btn-line">Publications</a>
    </div>
  </div>`;

const TREATMENTS = {
  sonar: () => {
    stage.className = 'stage t-sonar';
    stage.innerHTML = `
      <canvas id="sonar-c"></canvas>
      ${COMMON_CONTENT()}
      <div class="sonar-stats fade-up d3">
        <div class="row"><span>Vessels tracked</span><span class="num">2 814</span></div>
        <div class="row"><span>EU coast (km)</span><span class="num">68 000</span></div>
        <div class="row"><span>Member states</span><span class="num">22</span></div>
        <div class="row"><span>Strategic units</span><span class="num">04</span></div>
      </div>`;
    runSonar();
  },
  bathy: () => {
    stage.className = 'stage t-bathy';
    stage.innerHTML = `
      <canvas id="bathy-c"></canvas>
      ${COMMON_CONTENT()}`;
    runBathy();
  },
  const: () => {
    stage.className = 'stage t-const';
    stage.innerHTML = `
      <canvas id="const-c"></canvas>
      ${COMMON_CONTENT()}
      <div class="legend fade-up d4">
        <div><span class="dot"></span>Institutions <span>· 142</span></div>
        <div><span class="dot" style="background:#fff;box-shadow:0 0 12px #fff"></span>Industry <span>· 89</span></div>
        <div><span class="dot" style="background:rgba(200,145,58,.4);box-shadow:none"></span>Academia <span>· 64</span></div>
      </div>`;
    runConst();
  },
  liquid: () => {
    stage.className = 'stage t-liquid';
    stage.innerHTML = `
      <canvas id="liquid-c"></canvas>
      ${COMMON_CONTENT()}
      <div class="marquee">
        <span>Blue Policy</span><span>·</span><span>Trade &amp; Logistics</span><span>·</span>
        <span>Defense &amp; Security</span><span>·</span><span>Tech, Energy &amp; Resources</span><span>·</span>
        <span>EU Mission Ocean</span><span>·</span><span>Horizon Europe</span><span>·</span>
        <span>Blue Policy</span><span>·</span><span>Trade &amp; Logistics</span><span>·</span>
        <span>Defense &amp; Security</span><span>·</span><span>Tech, Energy &amp; Resources</span><span>·</span>
        <span>EU Mission Ocean</span><span>·</span><span>Horizon Europe</span><span>·</span>
      </div>`;
    runLiquid();
  }
};

/* =========================================================
   ANIMATION RUNNERS — each cancels prior raf
   ========================================================= */
let rafId = 0;
function cancel(){ if(rafId){ cancelAnimationFrame(rafId); rafId=0; } }

/* ---------- SONAR ---------- */
function runSonar(){
  cancel();
  const c = document.getElementById('sonar-c');
  const ctx = c.getContext('2d');
  let W,H,cx,cy,R; const dpr = Math.min(2,window.devicePixelRatio||1);
  const fit = ()=>{ W=c.clientWidth=window.innerWidth; H=c.clientHeight=window.innerHeight;
    c.width=W*dpr; c.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
    cx=W*0.74; cy=H*0.5; R=Math.min(W,H)*0.42; };
  fit(); window.addEventListener('resize',fit);

  // partner blips at random bearings
  const blips=[]; for(let i=0;i<28;i++){
    blips.push({
      a:Math.random()*Math.PI*2,
      r:R*(0.25+Math.random()*0.72),
      tier:Math.random()<.35?2:Math.random()<.6?1:0,
      life:0
    });
  }
  let theta=0; const start=performance.now();

  const tick=(t)=>{
    const dt=(t-start)/1000;
    ctx.clearRect(0,0,W,H);

    // soft vignette under radar
    const grd = ctx.createRadialGradient(cx,cy,0,cx,cy,R*1.4);
    grd.addColorStop(0,'rgba(13,58,84,.35)');
    grd.addColorStop(1,'rgba(5,12,21,0)');
    ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);

    // grid rings
    ctx.strokeStyle='rgba(200,145,58,.18)'; ctx.lineWidth=1;
    for(let i=1;i<=4;i++){ ctx.beginPath(); ctx.arc(cx,cy,R*i/4,0,Math.PI*2); ctx.stroke(); }
    // crosshairs
    ctx.strokeStyle='rgba(200,145,58,.12)';
    for(let i=0;i<12;i++){ const a=i*Math.PI/6;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(a)*R, cy+Math.sin(a)*R); ctx.stroke();
    }
    // bearing ticks
    ctx.fillStyle='rgba(200,145,58,.55)';
    ctx.font='10px JetBrains Mono';
    ['000','090','180','270'].forEach((lbl,i)=>{
      const a=i*Math.PI/2 - Math.PI/2;
      const x=cx+Math.cos(a)*(R+18), y=cy+Math.sin(a)*(R+18);
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(lbl,x,y);
    });

    // sweep
    theta = (dt*0.7) % (Math.PI*2);
    const sweep = ctx.createConicGradient(theta-Math.PI/2, cx, cy);
    sweep.addColorStop(0,'rgba(200,145,58,.55)');
    sweep.addColorStop(0.18,'rgba(200,145,58,.0)');
    sweep.addColorStop(1,'rgba(200,145,58,0)');
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();
    ctx.fillStyle=sweep; ctx.fillRect(cx-R,cy-R,R*2,R*2);
    ctx.restore();

    // sweep arm
    ctx.strokeStyle='rgba(200,145,58,.85)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(theta)*R, cy+Math.sin(theta)*R); ctx.stroke();

    // blips light up when sweep crosses them
    blips.forEach(b=>{
      let diff=((b.a-theta)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
      if(diff<0.08) b.life=1;
      b.life *= 0.985;
      const x=cx+Math.cos(b.a)*b.r, y=cy+Math.sin(b.a)*b.r;
      const size = (b.tier===2?5:b.tier===1?3.5:2.4) * (1+b.life*1.6);
      ctx.fillStyle = b.tier===2 ? `rgba(255,255,255,${.45+b.life*.55})`
                    : b.tier===1 ? `rgba(232,184,112,${.45+b.life*.55})`
                                 : `rgba(200,145,58,${.32+b.life*.5})`;
      ctx.beginPath(); ctx.arc(x,y,size,0,Math.PI*2); ctx.fill();
      if(b.life>.4){ ctx.strokeStyle=`rgba(200,145,58,${b.life*.5})`;
        ctx.beginPath(); ctx.arc(x,y,size+8*b.life,0,Math.PI*2); ctx.stroke(); }
    });

    // center pip
    ctx.fillStyle='rgba(200,145,58,.95)';
    ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2); ctx.fill();

    rafId=requestAnimationFrame(tick);
  };
  rafId=requestAnimationFrame(tick);
}

/* ---------- BATHYMETRIC CONTOURS ---------- */
function runBathy(){
  cancel();
  const c=document.getElementById('bathy-c'); const ctx=c.getContext('2d');
  let W,H; const dpr=Math.min(2,window.devicePixelRatio||1);
  const fit=()=>{ W=c.clientWidth=window.innerWidth; H=c.clientHeight=window.innerHeight;
    c.width=W*dpr; c.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); };
  fit(); window.addEventListener('resize',fit);

  // pseudo-noise (cheap multi-sin field) — value at (x,y,t)
  const field=(x,y,t)=>{
    const k=0.0042;
    return Math.sin(x*k + t*0.18) +
           Math.sin(y*k*1.2 - t*0.13) +
           Math.sin((x+y)*k*0.7 + t*0.21) +
           Math.sin(Math.hypot(x-W*.55,y-H*.55)*k*1.4 - t*0.27);
  };

  const start=performance.now();
  const tick=(now)=>{
    const t=(now-start)/1000;
    ctx.fillStyle='#050c15'; ctx.fillRect(0,0,W,H);

    // marching-squares-lite: scan grid, draw segments at thresholds
    const step=14;
    const thresholds=[-2.4,-1.8,-1.2,-.6,0,.6,1.2,1.8,2.4];
    for(let ti=0;ti<thresholds.length;ti++){
      const T=thresholds[ti];
      const isMain = ti===4;
      ctx.strokeStyle = isMain
        ? 'rgba(200,145,58,.55)'
        : `rgba(200,145,58,${0.06+Math.abs(ti-4)*0.025})`;
      ctx.lineWidth = isMain ? 1.1 : 0.6;
      ctx.beginPath();
      for(let y=0;y<H-step;y+=step){
        for(let x=0;x<W-step;x+=step){
          const v00=field(x,y,t)-T, v10=field(x+step,y,t)-T,
                v01=field(x,y+step,t)-T, v11=field(x+step,y+step,t)-T;
          // top
          if((v00<0)!==(v10<0)){
            const r=v00/(v00-v10); ctx.moveTo(x+step*r,y);
            // bottom
            if((v01<0)!==(v11<0)){ const r2=v01/(v01-v11); ctx.lineTo(x+step*r2,y+step); }
            else if((v10<0)!==(v11<0)){ const r2=v10/(v10-v11); ctx.lineTo(x+step,y+step*r2); }
            else if((v00<0)!==(v01<0)){ const r2=v00/(v00-v01); ctx.lineTo(x,y+step*r2); }
          } else if((v10<0)!==(v11<0) && (v00<0)!==(v01<0)){
            const r=v10/(v10-v11), r2=v00/(v00-v01);
            ctx.moveTo(x+step,y+step*r); ctx.lineTo(x,y+step*r2);
          }
        }
      }
      ctx.stroke();
    }

    // gold radial vignette over center to give title contrast
    const grd=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.55);
    grd.addColorStop(0,'rgba(5,12,21,.78)');
    grd.addColorStop(.6,'rgba(5,12,21,.2)');
    grd.addColorStop(1,'rgba(5,12,21,0)');
    ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);

    rafId=requestAnimationFrame(tick);
  };
  rafId=requestAnimationFrame(tick);
}

/* ---------- CONSTELLATION NETWORK ---------- */
function runConst(){
  cancel();
  const c=document.getElementById('const-c'); const ctx=c.getContext('2d');
  let W,H; const dpr=Math.min(2,window.devicePixelRatio||1);
  const fit=()=>{ W=c.clientWidth=window.innerWidth; H=c.clientHeight=window.innerHeight;
    c.width=W*dpr; c.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); };
  fit(); window.addEventListener('resize',fit);

  const N=110;
  const nodes=Array.from({length:N},()=>({
    x:Math.random()*W, y:Math.random()*H,
    vx:(Math.random()-.5)*.12, vy:(Math.random()-.5)*.12,
    tier:Math.random()<.18?2:Math.random()<.5?1:0
  }));
  const pulses=[];
  let mx=W*.65, my=H*.5;
  window.addEventListener('mousemove',e=>{ mx=e.clientX; my=e.clientY; });

  setInterval(()=>{
    const a=Math.floor(Math.random()*N), b=Math.floor(Math.random()*N);
    if(a!==b) pulses.push({a,b,p:0});
  },650);

  const tick=()=>{
    ctx.fillStyle='rgba(5,12,21,.18)'; ctx.fillRect(0,0,W,H);

    // mouse parallax pull
    nodes.forEach(n=>{
      n.x+=n.vx; n.y+=n.vy;
      const dx=mx-n.x, dy=my-n.y, d=Math.hypot(dx,dy);
      if(d<260){ n.x+=dx*0.0008; n.y+=dy*0.0008; }
      if(n.x<-50)n.x=W+50; if(n.x>W+50)n.x=-50;
      if(n.y<-50)n.y=H+50; if(n.y>H+50)n.y=-50;
    });

    // connections
    for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){
      const a=nodes[i],b=nodes[j];
      const d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<160){
        const o=(1-d/160)*.32;
        ctx.strokeStyle=`rgba(200,145,58,${o*.6})`;
        ctx.lineWidth=.6;
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      }
    }

    // pulses
    for(let i=pulses.length-1;i>=0;i--){
      const p=pulses[i]; p.p+=0.018;
      if(p.p>=1){ pulses.splice(i,1); continue; }
      const a=nodes[p.a], b=nodes[p.b];
      const x=a.x+(b.x-a.x)*p.p, y=a.y+(b.y-a.y)*p.p;
      ctx.fillStyle='rgba(232,184,112,.95)';
      ctx.beginPath(); ctx.arc(x,y,2.6,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(200,145,58,.35)';
      ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2); ctx.fill();
    }

    // nodes
    nodes.forEach(n=>{
      const r = n.tier===2?3.4:n.tier===1?2.2:1.5;
      ctx.fillStyle = n.tier===2?'rgba(255,255,255,.95)':n.tier===1?'rgba(232,184,112,.85)':'rgba(200,145,58,.55)';
      ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2); ctx.fill();
      if(n.tier===2){
        ctx.strokeStyle='rgba(255,255,255,.18)';
        ctx.beginPath(); ctx.arc(n.x,n.y,9,0,Math.PI*2); ctx.stroke();
      }
    });

    rafId=requestAnimationFrame(tick);
  };
  rafId=requestAnimationFrame(tick);
}

/* ---------- LIQUID — sin-wave water at bottom ---------- */
function runLiquid(){
  cancel();
  const c=document.getElementById('liquid-c'); const ctx=c.getContext('2d');
  let W,H; const dpr=Math.min(2,window.devicePixelRatio||1);
  const fit=()=>{ W=c.clientWidth=window.innerWidth; H=c.clientHeight=window.innerHeight;
    c.width=W*dpr; c.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); };
  fit(); window.addEventListener('resize',fit);

  const start=performance.now();
  const tick=(now)=>{
    const t=(now-start)/1000;
    ctx.fillStyle='#050c15'; ctx.fillRect(0,0,W,H);

    // soft top vignette
    const top=ctx.createLinearGradient(0,0,0,H*.7);
    top.addColorStop(0,'rgba(13,58,84,.18)');
    top.addColorStop(1,'rgba(5,12,21,0)');
    ctx.fillStyle=top; ctx.fillRect(0,0,W,H);

    // stacked translucent waves
    for(let layer=0;layer<5;layer++){
      ctx.beginPath();
      const baseY=H*0.74 + layer*22;
      ctx.moveTo(0,H);
      for(let x=0;x<=W;x+=6){
        const y = baseY
          + Math.sin(x*0.006 + t*(0.6+layer*0.18) + layer)*16
          + Math.sin(x*0.013 - t*(0.4+layer*0.12))*8;
        ctx.lineTo(x,y);
      }
      ctx.lineTo(W,H); ctx.closePath();
      const alpha = 0.07 + layer*0.04;
      ctx.fillStyle = `rgba(200,145,58,${alpha})`;
      ctx.fill();
    }

    // crest line
    ctx.beginPath();
    for(let x=0;x<=W;x+=4){
      const y = H*0.74 + Math.sin(x*0.006+t*0.6)*16 + Math.sin(x*0.013-t*0.4)*8;
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.strokeStyle='rgba(232,184,112,.55)'; ctx.lineWidth=1; ctx.stroke();

    rafId=requestAnimationFrame(tick);
  };
  rafId=requestAnimationFrame(tick);
}

/* =========================================================
   SWITCHER + CLOCK + INIT
   ========================================================= */
const buttons = document.querySelectorAll('#switcher button');
function setTreatment(name){
  buttons.forEach(b=>b.classList.toggle('on', b.dataset.t===name));
  hudMode.textContent = ({sonar:'SONAR · v.01',bathy:'BATHYMETRIC · v.01',const:'CONSTELLATION · v.01',liquid:'LIQUID · v.01'})[name];
  TREATMENTS[name]();
}
buttons.forEach(b=>b.addEventListener('click',()=>setTreatment(b.dataset.t)));

// auto-cycle if user hasn't clicked
let userTouched=false;
buttons.forEach(b=>b.addEventListener('click',()=>userTouched=true));
const order=['sonar','bathy','const','liquid']; let idx=0;
setInterval(()=>{ if(userTouched) return; idx=(idx+1)%order.length; setTreatment(order[idx]); }, 9000);

// clock
const clk=document.getElementById('hud-clock');
setInterval(()=>{ const d=new Date();
  clk.textContent = d.toUTCString().split(' ')[4] + ' UTC';
},1000);

// keyboard 1-4
window.addEventListener('keydown',e=>{
  const map={'1':'sonar','2':'bathy','3':'const','4':'liquid'};
  if(map[e.key]){ userTouched=true; setTreatment(map[e.key]); }
});

setTreatment('sonar');
</script>
