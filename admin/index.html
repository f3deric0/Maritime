<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maritime Affairs — Editorial</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#050c15; --deep:#0a1620; --gold:#c8913a; --white:#f4ede0;
    --ff-d: 'Fraunces', Georgia, serif;
    --ff-c: 'JetBrains Mono', monospace;
    --ff-b: 'Inter', sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--ff-b);background:var(--ink);color:var(--white);min-height:100vh}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:1.4rem 2rem;border-bottom:1px solid rgba(255,255,255,.08);background:var(--deep)}
  .topbar h1{font-family:var(--ff-d);font-size:1.35rem;font-weight:600;letter-spacing:-.01em}
  .topbar h1 em{color:var(--gold);font-style:italic}
  .topbar .right{display:flex;gap:1rem;align-items:center}
  .pill{font-family:var(--ff-c);font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;padding:.4rem .8rem;border:1px solid rgba(200,145,58,.35);color:var(--gold);border-radius:100px}
  .btn{font-family:var(--ff-c);font-size:.7rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;padding:.7rem 1.2rem;background:var(--gold);color:var(--ink);border:none;cursor:pointer;transition:.2s}
  .btn:hover{background:#e0a544}
  .btn.ghost{background:transparent;color:var(--white);border:1px solid rgba(255,255,255,.2)}
  .btn.ghost:hover{border-color:var(--gold);color:var(--gold)}
  .btn.danger{background:transparent;color:#e0735a;border:1px solid rgba(224,115,90,.35)}
  .btn.danger:hover{background:rgba(224,115,90,.1)}
  main{max-width:1280px;margin:0 auto;padding:2.5rem 2rem}

  /* LOGIN */
  .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:radial-gradient(ellipse at 50% 30%, rgba(200,145,58,.08), transparent 60%)}
  .login-card{width:100%;max-width:420px;background:var(--deep);border:1px solid rgba(255,255,255,.08);padding:3rem 2.5rem}
  .login-card h2{font-family:var(--ff-d);font-size:1.8rem;font-weight:600;margin-bottom:.5rem}
  .login-card .sub{font-family:var(--ff-c);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:2rem}
  .field{margin-bottom:1.2rem}
  .field label{display:block;font-family:var(--ff-c);font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;opacity:.6;margin-bottom:.5rem}
  .field input,.field textarea,.field select{width:100%;padding:.85rem 1rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:var(--white);font-family:var(--ff-b);font-size:.95rem;transition:border .2s}
  .field textarea{resize:vertical;min-height:120px;font-family:var(--ff-b);line-height:1.5}
  .field textarea.code{font-family:var(--ff-c);font-size:.85rem;min-height:300px}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--gold)}
  .login-card .btn{width:100%;margin-top:.5rem;padding:.95rem}
  .login-error{font-family:var(--ff-c);font-size:.7rem;color:#e0735a;margin-top:1rem;display:none}
  .login-error.show{display:block}

  /* LIST */
  .list-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
  .list-head h2{font-family:var(--ff-d);font-size:2rem;font-weight:600}
  .list-head h2 em{color:var(--gold);font-style:italic}
  .list-head .meta{font-family:var(--ff-c);font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;opacity:.5}
  table{width:100%;border-collapse:collapse}
  thead{background:rgba(255,255,255,.03)}
  th{text-align:left;padding:1rem;font-family:var(--ff-c);font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;opacity:.55;font-weight:600;border-bottom:1px solid rgba(255,255,255,.1)}
  td{padding:1rem;border-bottom:1px solid rgba(255,255,255,.06);font-size:.92rem;vertical-align:middle}
  tr.row{cursor:pointer;transition:background .15s}
  tr.row:hover{background:rgba(200,145,58,.04)}
  td.title{font-weight:600;color:var(--white)}
  td .unit-tag{font-family:var(--ff-c);font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);opacity:.85}
  td .draft-tag{font-family:var(--ff-c);font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;padding:.25rem .55rem;border:1px solid rgba(255,180,90,.4);color:#e0a544;border-radius:100px;display:inline-block}
  td .pub-tag{font-family:var(--ff-c);font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;padding:.25rem .55rem;border:1px solid rgba(120,200,140,.35);color:#7fc88c;border-radius:100px;display:inline-block}
  .empty{text-align:center;padding:5rem 0;opacity:.4}
  .empty h3{font-family:var(--ff-d);font-size:1.4rem;margin-bottom:.5rem}

  /* EDITOR */
  .editor{display:grid;grid-template-columns:1fr 320px;gap:2rem}
  .editor .main{background:var(--deep);padding:2rem;border:1px solid rgba(255,255,255,.06)}
  .editor .side{display:flex;flex-direction:column;gap:1.2rem}
  .editor .side .panel{background:var(--deep);padding:1.5rem;border:1px solid rgba(255,255,255,.06)}
  .editor .side .panel h4{font-family:var(--ff-c);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem}
  .editor-actions{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.08)}
  .toggle{display:flex;align-items:center;gap:.8rem;padding:.7rem;background:rgba(255,255,255,.03);cursor:pointer}
  .toggle input{width:18px;height:18px;cursor:pointer;accent-color:var(--gold)}
  .toggle span{font-family:var(--ff-c);font-size:.75rem;letter-spacing:.1em}
  @media(max-width:900px){.editor{grid-template-columns:1fr}}

  .toast{position:fixed;bottom:2rem;right:2rem;background:var(--deep);border:1px solid var(--gold);color:var(--white);padding:1rem 1.4rem;font-family:var(--ff-c);font-size:.78rem;letter-spacing:.08em;z-index:1000;transform:translateY(100px);opacity:0;transition:.3s}
  .toast.show{transform:translateY(0);opacity:1}
  .toast.error{border-color:#e0735a;color:#ffb8a8}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login" class="login-screen">
  <div class="login-card">
    <div class="sub">Maritime Affairs</div>
    <h2>Editorial <em>Console</em></h2>
    <p style="opacity:.5;font-size:.85rem;margin:1rem 0 2rem;line-height:1.55">Sign in with your editorial credentials.</p>
    <form id="login-form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" required autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" required autocomplete="current-password">
      </div>
      <button class="btn" type="submit">Sign in →</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>
</div>

<!-- APP (hidden until logged in) -->
<div id="app" style="display:none">
  <div class="topbar">
    <h1>Editorial <em>Console</em></h1>
    <div class="right">
      <span class="pill" id="user-email">—</span>
      <button class="btn ghost" id="signout-btn">Sign out</button>
    </div>
  </div>

  <main id="app-main">
    <!-- list view -->
    <div id="view-list">
      <div class="list-head">
        <h2>All <em>articles</em></h2>
        <div style="display:flex;gap:1rem;align-items:center">
          <span class="meta" id="article-count">0 articles</span>
          <button class="btn" id="new-btn">+ New article</button>
        </div>
      </div>

      <div id="list-empty" class="empty" style="display:none">
        <h3>No articles yet</h3>
        <p>Click <strong>+ New article</strong> to write your first piece.</p>
      </div>

      <table id="list-table" style="display:none">
        <thead>
          <tr><th>Title</th><th>Unit</th><th>Author</th><th>Status</th><th>Updated</th></tr>
        </thead>
        <tbody id="list-tbody"></tbody>
      </table>
    </div>

    <!-- editor view -->
    <div id="view-editor" style="display:none">
      <div class="list-head">
        <button class="btn ghost" onclick="showList()">← Back to list</button>
        <span class="meta" id="editor-status">New article</span>
      </div>

      <div class="editor">
        <div class="main">
          <div class="field">
            <label>Title</label>
            <input type="text" id="f-title" placeholder="Article title">
          </div>
          <div class="field">
            <label>Slug (URL handle)</label>
            <input type="text" id="f-slug" placeholder="article-slug">
          </div>
          <div class="field">
            <label>Summary</label>
            <textarea id="f-summary" placeholder="Short abstract shown in lists and cards"></textarea>
          </div>
          <div class="field">
            <label>Content (HTML)</label>
            <textarea id="f-content" class="code" placeholder="<p>Write the body in HTML...</p>"></textarea>
          </div>

          <div class="editor-actions">
            <button class="btn" id="save-btn">Save</button>
            <button class="btn ghost" id="save-publish-btn">Save &amp; publish</button>
            <button class="btn danger" id="delete-btn" style="margin-left:auto">Delete</button>
          </div>
        </div>

        <div class="side">
          <div class="panel">
            <h4>Status</h4>
            <label class="toggle"><input type="checkbox" id="f-published"><span>Published</span></label>
          </div>
          <div class="panel">
            <h4>Metadata</h4>
            <div class="field">
              <label>Unit</label>
              <select id="f-unit">
                <option value="">—</option>
                <option>Defense &amp; Security</option>
                <option>Blue Economy &amp; Logistics</option>
                <option>Tech, Energy &amp; Resources</option>
                <option>Blue Policy &amp; Law</option>
                <option>Maritime Affairs</option>
              </select>
            </div>
            <div class="field">
              <label>Author</label>
              <input type="text" id="f-author" placeholder="Author name">
            </div>
            <div class="field">
              <label>Read time (min)</label>
              <input type="number" id="f-read-min" min="1" max="60" value="5">
            </div>
          </div>
          <div class="panel">
            <h4>Cover image</h4>
            <div class="field">
              <label>Image URL</label>
              <input type="url" id="f-image-url" placeholder="https://...">
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://xuinnqoftizczzvkmzjg.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1aW5ucW9mdGl6Y3p6dmttempnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDAzNDQsImV4cCI6MjA5MTIxNjM0NH0.q-9me1peZF1lcNuzep_e-tNa2eQJAnwkYWQZ0f5lkU4';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
let currentArticleId = null;

const $ = id => document.getElementById(id);
function toast(msg, isErr){
  const t = $('toast');
  t.textContent = msg;
  t.classList.toggle('error', !!isErr);
  t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), 2400);
}

/* ---- AUTH ---- */
$('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = $('login-email').value.trim();
  const password = $('login-password').value;
  const err = $('login-error');
  err.classList.remove('show');
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error){ err.textContent = error.message; err.classList.add('show'); return; }
  enterApp(data.user);
});

$('signout-btn').addEventListener('click', async () => {
  await sb.auth.signOut();
  location.reload();
});

async function checkSession(){
  const { data } = await sb.auth.getSession();
  if (data.session) enterApp(data.session.user);
}

function enterApp(user){
  $('login').style.display = 'none';
  $('app').style.display = 'block';
  $('user-email').textContent = user.email || 'Editor';
  loadList();
}

/* ---- LIST ---- */
async function loadList(){
  const { data, error } = await sb.from('articles')
    .select('id, slug, title, unit, author, published, published_at, updated_at')
    .order('updated_at', { ascending: false });
  if (error){ toast(error.message, true); return; }
  renderList(data || []);
}

function renderList(rows){
  $('article-count').textContent = `${rows.length} article${rows.length===1?'':'s'}`;
  if (!rows.length){
    $('list-empty').style.display = 'block';
    $('list-table').style.display = 'none';
    return;
  }
  $('list-empty').style.display = 'none';
  $('list-table').style.display = 'table';
  $('list-tbody').innerHTML = rows.map(r => `
    <tr class="row" data-id="${r.id}">
      <td class="title">${esc(r.title || '(untitled)')}</td>
      <td><span class="unit-tag">${esc(r.unit || '—')}</span></td>
      <td>${esc(r.author || '—')}</td>
      <td>${r.published ? '<span class="pub-tag">Published</span>' : '<span class="draft-tag">Draft</span>'}</td>
      <td style="opacity:.6">${r.updated_at ? new Date(r.updated_at).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}) : '—'}</td>
    </tr>`).join('');
  document.querySelectorAll('tr.row').forEach(tr => {
    tr.addEventListener('click', () => openEditor(tr.dataset.id));
  });
}

function esc(s){ return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---- EDITOR ---- */
$('new-btn').addEventListener('click', () => openEditor(null));

function showList(){ $('view-list').style.display='block'; $('view-editor').style.display='none'; loadList(); }

async function openEditor(id){
  $('view-list').style.display = 'none';
  $('view-editor').style.display = 'block';
  if (!id){
    currentArticleId = null;
    $('editor-status').textContent = 'New article';
    $('f-title').value=''; $('f-slug').value=''; $('f-summary').value='';
    $('f-content').value=''; $('f-unit').value=''; $('f-author').value='';
    $('f-image-url').value=''; $('f-read-min').value=5; $('f-published').checked=false;
    $('delete-btn').style.display='none';
    return;
  }
  currentArticleId = id;
  const { data, error } = await sb.from('articles').select('*').eq('id', id).single();
  if (error || !data){ toast('Failed to load article', true); showList(); return; }
  $('editor-status').textContent = 'Editing — ' + (data.title || '(untitled)');
  $('f-title').value = data.title || '';
  $('f-slug').value = data.slug || '';
  $('f-summary').value = data.summary || '';
  $('f-content').value = data.content || '';
  $('f-unit').value = data.unit || '';
  $('f-author').value = data.author || '';
  $('f-image-url').value = data.image_url || '';
  $('f-read-min').value = data.read_min || 5;
  $('f-published').checked = !!data.published;
  $('delete-btn').style.display = 'inline-block';
}

function collect(){
  return {
    title: $('f-title').value.trim() || 'Untitled',
    slug: ($('f-slug').value.trim() || $('f-title').value.trim().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')) || null,
    summary: $('f-summary').value.trim() || null,
    content: $('f-content').value.trim() || null,
    unit: $('f-unit').value || null,
    author: $('f-author').value.trim() || null,
    image_url: $('f-image-url').value.trim() || null,
    read_min: Number($('f-read-min').value) || 5,
    published: $('f-published').checked,
    updated_at: new Date().toISOString()
  };
}

async function save(forcePublish){
  const payload = collect();
  if (forcePublish){ payload.published = true; $('f-published').checked = true; }
  if (payload.published && !payload.published_at) payload.published_at = new Date().toISOString();

  let res;
  if (currentArticleId){
    res = await sb.from('articles').update(payload).eq('id', currentArticleId).select().single();
  } else {
    res = await sb.from('articles').insert(payload).select().single();
  }
  if (res.error){ toast(res.error.message, true); return; }
  currentArticleId = res.data.id;
  $('editor-status').textContent = 'Editing — ' + (res.data.title || '(untitled)');
  $('delete-btn').style.display = 'inline-block';
  toast(forcePublish ? 'Saved & published' : 'Saved');
}

$('save-btn').addEventListener('click', () => save(false));
$('save-publish-btn').addEventListener('click', () => save(true));

$('delete-btn').addEventListener('click', async () => {
  if (!currentArticleId) return;
  if (!confirm('Delete this article? This cannot be undone.')) return;
  const { error } = await sb.from('articles').delete().eq('id', currentArticleId);
  if (error){ toast(error.message, true); return; }
  toast('Deleted');
  showList();
});

checkSession();
</script>
</body>
</html>
