<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/images/Logo-maritimes.png">
    <title>Publications — Maritime Affairs</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* ── RESET & CURSOR ── */
        body { background: var(--ink); cursor: none; margin: 0; }
        
        #compass-cursor {
            position: fixed;
            top: 0; left: 0;
            width: 56px; height: 56px;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
        }

        #cursor-dot {
            position: fixed;
            width: 4px; height: 4px;
            background: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10001;
            transform: translate(-50%, -50%);
        }

        /* ── NAV ALIGNMENT (Centratura come Index) ── */
        #nav {
            position: fixed; top: 0; left: 0; width: 100%;
            height: 80px; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5vw; background: rgba(5, 12, 21, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
            margin: 0; padding: 0;
            position: absolute;
            left: 50%;
            transform: translateX(-50%); /* Forza la centratura perfetta dei link */
        }

        .nav-links li a {
            font-family: var(--ff-c);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--white);
            transition: color 0.3s ease;
        }

        .nav-links li a:hover { color: var(--gold); }

        /* ── PUBLICATIONS SPECIFIC ── */
        .pub-hero { 
            min-height: 50vh; 
            background: var(--deep); 
            display: flex; align-items: flex-end; 
            position: relative; overflow: hidden; 
            padding: 0 5vw 5rem;
            margin-top: 0; 
        }

        .pub-filters { 
            background: var(--ink); 
            padding: 1.5rem 5vw; 
            border-bottom: 1px solid rgba(255,255,255,.06); 
            position: sticky; 
            top: 80px; /* Si aggancia sotto la nav da 80px */
            z-index: 100; 
            backdrop-filter: blur(20px); 
        }

        .pub-filters-inner { max-width: 1200px; margin: 0 auto; display: flex; gap: .8rem; flex-wrap: wrap; align-items: center; }

        .filter-btn { 
            font-family: var(--ff-c); font-size: .64rem; font-weight: 700; 
            letter-spacing: .14em; text-transform: uppercase; 
            color: rgba(255,255,255,.45); border: 1px solid rgba(255,255,255,.1); 
            background: transparent; border-radius: 100px; 
            padding: 8px 18px; cursor: none; transition: all .3s var(--ease); 
        }

        .filter-btn.active { color: var(--ink); background: var(--gold); border-color: var(--gold); }

        .pub-main { background: var(--ink); padding: 4rem 5vw 6rem; min-height: 60vh; }
        .pub-inner { max-width: 1200px; margin: 0 auto; }
        .pub-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    </style>
</head>
<body>

<div id="compass-cursor">
    <svg viewBox="0 0 56 56" fill="none">
        <circle cx="28" cy="28" r="26" stroke="rgba(200,145,58,.35)" stroke-width="1"/>
        <line x1="28" y1="2"  x2="28" y2="8"  stroke="rgba(200,145,58,.5)" stroke-width="1.5"/>
        <line x1="28" y1="48" x2="28" y2="54" stroke="rgba(200,145,58,.5)" stroke-width="1.5"/>
        <line x1="2"  y1="28" x2="8"  y2="28" stroke="rgba(200,145,58,.5)" stroke-width="1.5"/>
        <line x1="48" y1="28" x2="54" y2="28" stroke="rgba(200,145,58,.5)" stroke-width="1.5"/>
        <g class="needle">
            <polygon points="28,6 30.5,26 28,32 25.5,26" fill="rgba(200,145,58,.9)"/>
            <polygon points="28,50 30.5,30 28,24 25.5,30" fill="rgba(255,255,255,.25)"/>
        </g>
        <circle cx="28" cy="28" r="2.5" fill="rgba(200,145,58,.8)"/>
    </svg>
</div>
<div id="cursor-dot"></div>

<nav id="nav">
    <a href="index.html" class="logo">
        <div class="logo-pill">
            <img src="./assets/images/Logo-maritimes.png" alt="Maritime Affairs" style="height:44px;width:auto;display:block;">
            <div class="logo-text">
                <div class="logo-name" style="color:white; font-family:var(--ff-d);">Maritime <em style="color:var(--gold); font-style:italic;">Affairs</em></div>
                <span class="logo-sub" style="font-family:var(--ff-c); color:rgba(255,255,255,0.5); font-size:0.6rem; text-transform:uppercase;">EU Blue Economy Do-Tank</span>
            </div>
        </div>
    </a>

    <ul class="nav-links">
        <li><a href="index.html#mission">Mission</a></li>
        <li><a href="index.html#units">Units</a></li>
        <li><a href="index.html#network">Network</a></li>
        <li><a href="publications.html" style="color:var(--gold)">Publications</a></li>
        <li><a href="index.html#contact">Join</a></li>
    </ul>

    <div class="nav-r" style="display:flex; align-items:center; gap:20px;">
        <div class="nav-pulse" style="font-family:var(--ff-c); color:white; font-size:0.7rem; display:flex; align-items:center; gap:8px;">
            <div class="pulse-dot" style="width:6px; height:6px; background:#4CAF50; border-radius:50%;"></div>EU NGO
        </div>
        <a href="index.html#contact" class="nav-btn" style="background:var(--gold); color:var(--ink); padding:10px 20px; border-radius:100px; text-decoration:none; font-family:var(--ff-c); font-size:0.75rem; font-weight:800;">Join Us</a>
    </div>
</nav>

<section class="pub-hero">
    <div class="pub-hero-inner">
        <div class="section-marker show" style="margin-bottom:1.5rem">Expert Knowledge</div>
        <h1>Our <em>Publications</em></h1>
        <p>Briefs, explainers and in-depth analysis from across the Blue Economy.</p>
    </div>
    <div class="pub-hero-count" id="hero-count">—</div>
</section>

<div class="pub-filters">
    <div class="pub-filters-inner">
        <button class="filter-btn active" data-unit="all">All</button>
        <button class="filter-btn" data-unit="Blue Policy & Law">Blue Policy & Law</button>
        <button class="filter-btn" data-unit="Blue Economy & Logistics">Blue Economy & Logistics</button>
        <button class="filter-btn" data-unit="Defense & Security">Defense & Security</button>
        <button class="filter-btn" data-unit="Tech, Energy & Resources">Tech, Energy & Resources</button>
    </div>
</div>

<main class="pub-main">
    <div class="pub-inner">
        <div id="featured-slot"></div>
        <div class="pub-grid" id="articles-grid"></div>
        <div class="pub-loading" id="loading-state">
            <div class="pub-spinner"></div>
            <p>Loading publications</p>
        </div>
        <div class="pub-empty" id="empty-state" style="display:none; text-align:center; padding:5rem;">
            <h3 style="color:white; opacity:0.5;">No articles found</h3>
        </div>
    </div>
</main>

</body>
</html>
