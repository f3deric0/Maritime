<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications — Maritime Affairs</title>
    <meta name="description" content="Briefs, explainers and reports from the Maritime Affairs expert network.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* ── CURSOR SYSTEM (Bussola) ── */
        body { cursor: none; } /* Nascondiamo il cursore standard */
        
        #compass-cursor {
            position: fixed;
            top: 0; left: 0;
            width: 56px; height: 56px;
            pointer-events: none; /* Cruciale per cliccare gli elementi sottostanti */
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, opacity 0.3s;
        }
        #cursor-dot {
            position: fixed;
            width: 4px; height: 4px;
            background: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10001;
            transform: translate(-50%, -50%);
        }

        /* ── PUBLICATIONS HERO ── */
        .pub-hero {
            min-height: 45vh;
            background: var(--deep);
            display: flex; align-items: flex-end;
            position: relative; overflow: hidden;
            padding: 0 5vw 5rem;
            margin-top: 64px; /* Lascia spazio alla nav fissa */
        }
        .pub-hero::before {
            content: '';
            position: absolute; inset: 0;
            background: 
                radial-gradient(ellipse at 20% 100%, rgba(200,145,58,.12) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 0%, rgba(13,58,84,.5) 0%, transparent 50%);
        }
        .pub-hero-inner { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; width: 100%; }
        .pub-hero h1 {
            font-family: var(--ff-d);
            font-size: clamp(3.5rem, 8vw, 8.5rem);
            font-weight: 700; line-height: 0.95; letter-spacing: -0.02em;
            color: var(--white); margin-bottom: 1.5rem;
        }
        .pub-hero h1 em { font-style: italic; color: var(--gold); }
        .pub-hero p {
            font-family: var(--ff-b); font-size: 1.1rem; font-weight: 300;
            color: rgba(255,255,255,0.6); max-width: 480px; line-height: 1.8;
        }
        .pub-hero-count {
            position: absolute; bottom: 4rem; right: 5vw;
            font-family: var(--ff-d); font-size: clamp(4rem, 10vw, 7rem); font-weight: 700;
            color: rgba(200,145,58,0.08); line-height: 1; pointer-events: none;
        }

        /* ── FILTERS ── */
        .pub-filters {
            background: var(--ink);
            padding: 1.5rem 5vw;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            position: sticky; top: 64px; z-index: 90;
            backdrop-filter: blur(20px);
        }
        .pub-filters-inner {
            max-width: 1200px; margin: 0 auto;
            display: flex; gap: 0.8rem; flex-wrap: wrap; align-items: center;
        }
        .filter-btn {
            font-family: var(--ff-c); font-size: 0.65rem; font-weight: 700;
            letter-spacing: 0.12em; text-transform: uppercase;
            color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.1);
            background: transparent; border-radius: 100px;
            padding: 10px 20px; cursor: none;
            transition: all 0.3s var(--ease);
        }
        .filter-btn:hover { color: var(--white); border-color: var(--gold); }
        .filter-btn.active {
            color: var(--ink); background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 4px 20px rgba(200,145,58,0.3);
        }
        
        /* Navbar fissa per evitare salti di layout */
        #nav {
            position: fixed; top: 0; left: 0; width: 100%;
            z-index: 1000; background: rgba(5, 12, 21, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

<div id="compass-cursor">
    <svg viewBox="0 0 56 56" fill="none">
        <circle cx="28" cy="28" r="26" stroke="rgba(200,145,58,0.35)" stroke-width="1"/>
        <line x1="28" y1="2"  x2="28" y2="8"  stroke="rgba(200,145,58,0.5)" stroke-width="1.5"/>
        <line x1="28" y1="48" x2="28" y2="54" stroke="rgba(200,145,58,0.5)" stroke-width="1.5"/>
        <line x1="2"  y1="28" x2="8"  y2="28" stroke="rgba(200,145,58,0.5)" stroke-width="1.5"/>
        <line x1="48" y1="28" x2="54" y2="28" stroke="rgba(200,145,58,0.5)" stroke-width="1.5"/>
        <g class="needle">
            <polygon points="28,6 30.5,26 28,32 25.5,26" fill="rgba(200,145,58,0.9)"/>
            <polygon points="28,50 30.5,30 28,24 25.5,30" fill="rgba(255,255,255,0.25)"/>
        </g>
        <circle cx="28" cy="28" r="2.5" fill="rgba(200,145,58,0.8)"/>
    </svg>
</div>
<div id="cursor-dot"></div>

<nav id="nav" class="dark">
    <a href="index.html" class="logo">
        <div class="logo-pill">
            <img src="https://maritime-affairs.eu/wp-content/uploads/2026/03/Logo-maritimes.jpg" alt="Maritime Affairs" style="height:44px;width:auto;display:block;">
            <div class="logo-text">
                <div class="logo-name">Maritime <em>Affairs</em></div>
                <span class="logo-sub">EU Blue Economy Do-Tank</span>
            </div>
        </div>
    </a>
    <ul class="nav-links">
        <li><a href="index.html#mission">Mission</a></li>
        <li><a href="index.html#units">Units</a></li>
        <li><a href="index.html#network">Network</a></li>
        <li><a href="publications.html" style="color:var(--gold)">Publications</a></li>
        <li><a href="index.html#contact">Join</a></li>
    </ul>
    <div class="nav-r">
        <div class="nav-pulse"><div class="pulse-dot"></div>EU NGO</div>
        <a href="index.html#contact" class="nav-btn">Join Us</a>
    </div>
</nav>

<section class="pub-hero">
    <div class="pub-hero-inner">
        <div class="section-marker show" style="margin-bottom:1.5rem; opacity: 1; transform: translateY(0);">Expert Knowledge</div>
        <h1>Our <em>Publications</em></h1>
        <p>Strategic briefs, policy explainers and in-depth reports from the European maritime expert network.</p>
    </div>
    <div class="pub-hero-count" id="hero-count">0</div>
</section>

<div class="pub-filters">
    <div class="pub-filters-inner">
        <button class="filter-btn active" data-unit="all">All Units</button>
        <button class="filter-btn" data-unit="Blue Policy & Law">Blue Policy & Law</button>
        <button class="filter-btn" data-unit="Blue Economy & Logistics">Blue Economy & Logistics</button>
        <button class="filter-btn" data-unit="Defense & Security">Defense & Security</button>
        <button class="filter-btn" data-unit="Tech, Energy & Resources">Tech, Energy & Resources</button>
    </div>
</div>
    
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // 1. Usa nomi diversi o assicurati che non ci siano duplicati
    const SB_URL = 'https://xuinnqoftizczzvkmzjg.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1aW5ucW9mdGl6Y3p6dmttempnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDAzNDQsImV4cCI6MjA5MTIxNjM0NH0.q-9me1peZF1lcNuzep_e-tNa2eQJAnwkYWQZ0f5lkU4';
    
    // Inizializziamo il client con un nome univoco per evitare errori di "already declared"
    const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);
    
    let allArticles = [];
    let currentFilter = 'all';

    async function loadArticles() {
        try {
            // Usiamo il nuovo nome della variabile supabaseClient
            const { data, error } = await supabaseClient
                .from('articles')
                .select('*')
                .eq('published', true)
                .order('published_at', { ascending: false });

            if (error) throw error;
            
            allArticles = data || [];
            console.log("Articoli caricati con successo:", allArticles.length);
            renderAll();
        } catch (err) {
            console.error('Errore durante il fetch:', err);
            document.getElementById('loading-state').innerHTML = '<p style="color:red">Connection Error</p>';
        }
    }

    function renderAll() {
        const loadingState = document.getElementById('loading-state');
        if (loadingState) loadingState.style.display = 'none';
        
        const filtered = currentFilter === 'all' 
            ? allArticles 
            : allArticles.filter(a => a.unit === currentFilter);

        const heroCount = document.getElementById('hero-count');
        if (heroCount) heroCount.textContent = filtered.length;

        if (filtered.length === 0) {
            document.getElementById('empty-state').style.display = 'block';
            document.getElementById('featured-slot').innerHTML = '';
            document.getElementById('articles-grid').innerHTML = '';
            return;
        }

        document.getElementById('empty-state').style.display = 'none';
        
        // Primo articolo (Featured)
        const featured = filtered[0];
        document.getElementById('featured-slot').innerHTML = `
            <div class="pub-featured" onclick="window.location.href='article.html?id=${featured.slug || featured.id}'">
                <div class="pub-featured-img">
                    <img src="${featured.image_url || ''}" alt="" onerror="this.parentElement.innerHTML='<div class=\'pub-featured-img-placeholder\'></div>'">
                </div>
                <div class="pub-featured-body">
                    <div class="pub-featured-label">${featured.unit || 'General'}</div>
                    <h2>${featured.title}</h2>
                    <p>${featured.summary || ''}</p>
                    <div class="pub-featured-meta">
                        <div class="pub-meta-left">
                            <span class="pub-author">${featured.author || 'Maritime Affairs'}</span>
                            <span class="pub-date">${new Date(featured.published_at).toLocaleDateString('en-GB')}</span>
                        </div>
                        <div class="pub-read-btn">Read Article</div>
                    </div>
                </div>
            </div>`;

        // Altri articoli (Grid)
        const rest = filtered.slice(1);
        document.getElementById('articles-grid').innerHTML = rest.map(a => `
            <div class="pub-card" onclick="window.location.href='article.html?id=${a.slug || a.id}'">
                <div class="pub-card-img">
                    <img src="${a.image_url || ''}" alt="">
                    <div class="unit-badge">${a.unit || 'General'}</div>
                </div>
                <div class="pub-card-body">
                    <h3>${a.title}</h3>
                    <p>${a.summary || ''}</p>
                    <div class="pub-card-footer">
                        <span class="pub-card-meta">${new Date(a.published_at).toLocaleDateString('en-GB')}</span>
                        <div class="pub-card-arrow">→</div>
                    </div>
                </div>
            </div>`).join('');
    }

    // Filtri
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.unit;
            renderAll();
        });
    });

    // Avvio
    loadArticles();
</script>

</body>
</html>
