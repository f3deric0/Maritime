<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/images/Logo-maritimes.png">
    <title>Publications — Maritime Affairs</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* Sincronizzazione variabili con Index */
        :root {
            --gold: #c8913a;
            --ink: #050c15;
            --white: #ffffff;
            --ff-d: 'Cormorant Garamond', serif;
            --ff-c: 'Barlow Condensed', sans-serif;
            --ff-b: 'Barlow', sans-serif;
        }

        body { background: var(--ink); cursor: none; margin: 0; overflow-x: hidden; color: var(--white); font-family: var(--ff-b); }
        
        /* ── COMPASS CURSOR (Identico a Index) ── */
        #compass-cursor { position: fixed; top: 0; left: 0; width: 56px; height: 56px; pointer-events: none; z-index: 10000; transform: translate(-50%, -50%); transition: transform 0.1s ease-out; }
        #cursor-dot { position: fixed; width: 4px; height: 4px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 10001; transform: translate(-50%, -50%); }

        /* ── HERO STYLING ── */
        .pub-hero {
            min-height: 60vh; background: var(--ink); display: flex; align-items: flex-end;
            position: relative; padding: 0 5vw 8rem;
        }
        .mega-title-pub {
            font-family: var(--ff-d);
            font-size: clamp(3.5rem, 10vw, 8rem);
            line-height: 0.9;
            margin: 0;
        }
        .mega-title-pub span.gold-text { color: var(--gold); font-style: italic; display: block; }
        .mega-title-pub span.white-text { color: var(--white); display: block; }

        /* ── FILTERS ── */
        .pub-filters {
            background: rgba(5, 12, 21, 0.8); padding: 1.5rem 0; position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(20px);
        }
        .pub-filters-inner { max-width: 1200px; margin: 0 auto; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .filter-btn {
            font-family: var(--ff-c); font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; color: rgba(255,255,255,0.5); background: transparent;
            border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 100px;
            cursor: none; transition: 0.3s;
        }
        .filter-btn.active { background: var(--gold); color: var(--ink); border-color: var(--gold); }

        /* ── GRID ── */
        .pub-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2.5rem; padding: 4rem 0; }
        .pub-card {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07);
            transition: 0.4s ease; cursor: none;
        }
        .pub-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .pub-card-img { width: 100%; aspect-ratio: 16/10; background: #111; overflow: hidden; }
        .pub-card-img img { width: 100%; height: 100%; object-fit: cover; }
        .pub-card-body { padding: 2rem; }
        .pub-card h3 { font-family: var(--ff-d); font-size: 1.6rem; margin: 0 0 1rem; line-height: 1.2; }
        .pub-card p { font-size: 0.95rem; opacity: 0.6; line-height: 1.6; }

        .wrap { max-width: 1400px; margin: 0 auto; padding: 0 5vw; }

        @media (max-width: 992px) { .pub-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .pub-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="compass-cursor">
  <svg viewBox="0 0 56 56" fill="none">
    <circle cx="28" cy="28" r="26" stroke="rgba(200,145,58,.35)" stroke-width="1"/>
    <g class="needle">
      <polygon points="28,6 30.5,26 28,32 25.5,26" fill="rgba(200,145,58,.9)"/>
      <polygon points="28,50 30.5,30 28,24 25.5,30" fill="rgba(255,255,255,.25)"/>
    </g>
    <circle cx="28" cy="28" r="2.5" fill="rgba(200,145,58,.8)"/>
  </svg>
</div>
<div id="cursor-dot"></div>

<nav id="nav" style="position: fixed; width: 100%; top:0; z-index: 1000; background: rgba(5,12,21,0.9); height: 80px; display: flex; align-items: center; justify-content: space-between; padding: 0 5vw; box-sizing: border-box; border-bottom: 1px solid rgba(255,255,255,0.05);">
    <a href="index.html" class="logo" style="text-decoration:none">
        <div style="display:flex; align-items:center; gap:12px;">
            <img src="./assets/images/Logo-maritimes.png" alt="" style="height:40px;">
            <div style="color:white; font-family:var(--ff-d); font-size:1.2rem; font-weight:700;">Maritime <em style="color:var(--gold)">Affairs</em></div>
        </div>
    </a>
    <div style="font-family:var(--ff-c); font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase;">
        <a href="index.html" style="color:white; text-decoration:none; margin-left:20px">Home</a>
        <a href="publications.html" style="color:var(--gold); text-decoration:none; margin-left:20px">Publications</a>
    </div>
</nav>

<section class="pub-hero">
    <div class="wrap">
        <div style="color:var(--gold); font-family:var(--ff-c); text-transform:uppercase; letter-spacing:0.2em; font-size:0.75rem; margin-bottom:1.5rem;">Expert Knowledge</div>
        <h1 class="mega-title-pub">
            <span class="gold-text">Our</span>
            <span class="white-text">Publications</span>
        </h1>
        <p style="max-width: 500px; opacity: 0.6; margin-top:2rem; line-height:1.8;">Strategic briefs, policy explainers and in-depth reports from the European maritime expert network.</p>
    </div>
    <div id="hero-count" style="position:absolute; bottom:4rem; right:5vw; font-family:var(--ff-d); font-size:7rem; color:rgba(200,145,58,0.08);">0</div>
</section>

<div class="pub-filters">
    <div class="wrap">
        <div class="pub-filters-inner">
            <button class="filter-btn active" data-unit="all">All Units</button>
            <button class="filter-btn" data-unit="Blue Policy & Law">Blue Policy & Law</button>
            <button class="filter-btn" data-unit="Blue Economy & Logistics">Blue Economy & Logistics</button>
            <button class="filter-btn" data-unit="Defense & Security">Defense & Security</button>
            <button class="filter-btn" data-unit="Tech, Energy & Resources">Tech, Energy & Resources</button>
        </div>
    </div>
</div>

<main class="wrap">

         No articles found in this category.

</main>

function renderGrid() {
    const grid = document.getElementById('articles-grid');
    const list = currentFilter === 'all' ? allArticles : allArticles.filter(a => a.unit === currentFilter);
    
    document.getElementById('hero-count').textContent = list.length;
    document.getElementById('empty-state').style.display = list.length ? 'none' : 'block';

    grid.innerHTML = list.map(a => `
        <article class="pub-card" onclick="window.location.href='article.html?id=${a.slug || a.id}'">

            <div class="pub-card-body">
                <div style="color:var(--gold); font-family:var(--ff-c); font-size:0.65rem; text-transform:uppercase; margin-bottom:1rem;">${a.unit || 'Unit'}</div>
                <h3>${a.title}</h3>
                <p>${a.summary || ''}</p>
                <div style="margin-top:2rem; font-size:0.7rem; opacity:0.4; font-family:var(--ff-c)">
                    ${new Date(a.published_at).toLocaleDateString('en-GB')}
                </div>
            </div>
        </article>
    `).join('');
}

// Filtri
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.unit;
        renderGrid();
    });
});

// Cursor Logic (Identico alla tua Index)
const cursor = document.getElementById('compass-cursor');
const dot = document.getElementById('cursor-dot');

document.addEventListener('mousemove', (e) => {
    const x = e.clientX;
    const y = e.clientY;
    cursor.style.transform = `translate(${x}px, ${y}px)`;
    dot.style.transform = `translate(${x}px, ${y}px)`;
});

    }

</script>
</body>
</html>
