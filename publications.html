<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/images/Logo-maritimes.png">
    <title>Publications — Maritime Affairs</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">

    <style>
        body { background: var(--ink); color: var(--white); cursor: none; margin: 0; }
        
        /* Navigazione Fissa */
        #nav { 
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; 
            background: rgba(5, 12, 21, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5vw; height: 80px; box-sizing: border-box;
        }

        /* Hero */
        .pub-hero {
            min-height: 50vh; background: var(--deep);
            display: flex; align-items: flex-end;
            position: relative; overflow: hidden;
            padding: 0 5vw 6rem;
        }
        .pub-hero-inner { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; width: 100%; }
        .pub-hero h1 { font-family: var(--ff-d); font-size: clamp(3.5rem, 8vw, 7rem); margin: 0; line-height: 0.9; }
        .pub-hero h1 em { font-style: italic; color: var(--gold); }
        .pub-hero-count { position: absolute; bottom: 4rem; right: 5vw; font-family: var(--ff-d); font-size: 6rem; color: rgba(200,145,58,0.1); }

        /* Filtri (Ripristino stile grafico) */
        .pub-filters {
            background: var(--ink); padding: 1.5rem 5vw;
            position: sticky; top: 80px; z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .pub-filters-inner { max-width: 1200px; margin: 0 auto; display: flex; gap: 10px; flex-wrap: wrap; }
        
        .filter-btn {
            font-family: var(--ff-c); font-size: 0.65rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: rgba(255,255,255,0.5); background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px; border-radius: 100px; cursor: none;
            transition: all 0.3s ease;
        }
        .filter-btn:hover { color: var(--white); border-color: var(--gold); }
        .filter-btn.active { background: var(--gold); color: var(--ink); border-color: var(--gold); }

        /* Griglia Articoli */
        .pub-main { padding: 4rem 5vw; background: var(--ink); }
        .wrap { max-width: 1200px; margin: 0 auto; }
        .pub-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-top: 40px; }
        
        .pub-card { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
            padding: 2rem; transition: 0.4s;
        }
        .pub-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        
        .pub-loading { text-align: center; padding: 5rem; font-family: var(--ff-c); color: var(--gold); }
        .pub-spinner { width: 40px; height: 40px; border: 2px solid rgba(200,145,58,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="compass-cursor">
    <svg viewBox="0 0 56 56" fill="none"><circle cx="28" cy="28" r="26" stroke="rgba(200,145,58,.35)" stroke-width="1"/><g class="needle"><polygon points="28,6 30.5,26 28,32 25.5,26" fill="rgba(200,145,58,.9)"/><polygon points="28,50 30.5,30 28,24 25.5,30" fill="rgba(255,255,255,.25)"/></g></svg>
</div>
<div id="cursor-dot"></div>
<div id="bar"></div>

<nav id="nav">
    <a href="index.html" class="logo" style="text-decoration:none; display:flex; align-items:center; gap:15px;">
        <img src="./assets/images/Logo-maritimes.png" alt="" style="height:44px;">
        <div class="logo-text" style="color:white;">
            <div style="font-family:var(--ff-d); font-size:1.2rem;">Maritime <em style="color:var(--gold);">Affairs</em></div>
            <div style="font-family:var(--ff-c); font-size:0.6rem; text-transform:uppercase; opacity:0.6;">EU Blue Economy Do-Tank</div>
        </div>
    </a>
    <ul class="nav-links" style="display:flex; gap:30px; list-style:none; font-family:var(--ff-c); font-size:0.7rem; text-transform:uppercase;">
        <li><a href="index.html#mission" style="color:white; text-decoration:none;">Mission</a></li>
        <li><a href="index.html#units" style="color:white; text-decoration:none;">Units</a></li>
        <li><a href="publications.html" style="color:var(--gold); text-decoration:none;">Publications</a></li>
    </ul>
    <a href="index.html#contact" class="nav-btn" style="background:var(--gold); color:var(--ink); padding:10px 20px; border-radius:100px; text-decoration:none; font-family:var(--ff-c); font-size:0.7rem; font-weight:700;">JOIN US</a>
</nav>

<section class="pub-hero">
    <div class="pub-hero-inner">
        <div class="section-marker">Expert Knowledge</div>
        <h1>Our <em>Publications</em></h1>
    </div>
    <div class="pub-hero-count" id="hero-count">0</div>
</section>

<div class="pub-filters">
    <div class="pub-filters-inner">
        <button class="filter-btn active" data-unit="all">All</button>
        <button class="filter-btn" data-unit="Blue Policy & Law">Blue Policy & Law</button>
        <button class="filter-btn" data-unit="Blue Economy & Logistics">Blue Economy & Logistics</button>
        <button class="filter-btn" data-unit="Defense & Security">Defense & Security</button>
        <button class="filter-btn" data-unit="Tech, Energy & Resources">Tech, Energy & Resources</button>
    </div>
</div>

<main class="pub-main">
    <div class="wrap">
        <div id="articles-grid" class="pub-grid"></div>
        <div id="loading-state" class="pub-loading">
            <div class="pub-spinner"></div>
            <p>Sincronizzazione dati...</p>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SB_URL = 'https://xuinnqoftizczzvkmzjg.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1aW5ucW9mdGl6Y3p6dmttempnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDAzNDQsImV4cCI6MjA5MTIxNjM0NH0.q-9me1peZF1lcNuzep_e-tNa2eQJAnwkYWQZ0f5lkU4';
    const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

    let allArticles = [];
    let currentFilter = 'all';

    async function loadArticles() {
        const { data, error } = await supabaseClient.from('articles').select('*').eq('published', true);
        if (error) { console.error(error); return; }
        allArticles = data || [];
        renderAll();
    }

    function renderAll() {
        document.getElementById('loading-state').style.display = 'none';
        const filtered = currentFilter === 'all' ? allArticles : allArticles.filter(a => a.unit === currentFilter);
        document.getElementById('hero-count').textContent = filtered.length;
        
        document.getElementById('articles-grid').innerHTML = filtered.map(a => `
            <div class="pub-card" onclick="location.href='article.html?id=${a.slug || a.id}'">
                <div style="color:var(--gold); font-family:var(--ff-c); font-size:0.6rem; margin-bottom:10px;">${a.unit}</div>
                <h3 style="font-family:var(--ff-d); margin:0 0 15px 0;">${a.title}</h3>
                <p style="font-family:var(--ff-b); opacity:0.6; font-size:0.9rem;">${a.summary}</p>
                <div style="border-top:1px solid rgba(255,255,255,0.1); padding-top:15px; margin-top:20px; font-family:var(--ff-c); font-size:0.6rem; opacity:0.4;">
                    ${new Date(a.published_at).toLocaleDateString('it-IT')} · ${a.read_min || 5} MIN READ
                </div>
            </div>
        `).join('');
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.unit;
            renderAll();
        });
    });

    loadArticles();
</script>
<script src="js/main.js"></script>
</body>
</html>
