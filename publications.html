<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications — Maritime Affairs</title>
    <meta name="description" content="Briefs, explainers and reports from the Maritime Affairs expert network.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ── PUBLICATIONS PAGE ── */
        .pub-hero { min-height: 40vh; background: var(--deep); display: flex; align-items: flex-end; position: relative; overflow: hidden; padding: 0 5vw 5rem; }
        .pub-hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 20% 100%, rgba(200,145,58,.12) 0%, transparent 55%), radial-gradient(ellipse at 80% 0%, rgba(13,58,84,.5) 0%, transparent 50%); }
        .pub-hero-inner { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; width: 100%; }
        .pub-hero h1 { font-family: var(--ff-d); font-size: clamp(4rem, 9vw, 9rem); font-weight: 700; line-height: .92; letter-spacing: -.02em; color: var(--white); margin-bottom: 1.5rem; }
        .pub-hero h1 em { font-style: italic; color: var(--gold); }
        .pub-hero p { font-family: var(--ff-b); font-size: 1rem; font-weight: 300; color: rgba(255,255,255,.55); max-width: 460px; line-height: 1.9; }
        .pub-hero-count { position: absolute; bottom: 5rem; right: 5vw; font-family: var(--ff-d); font-size: 6rem; font-weight: 700; color: rgba(200,145,58,.07); line-height: 1; pointer-events: none; letter-spacing: -.04em; }
        .pub-filters { background: var(--ink); padding: 2rem 5vw; border-bottom: 1px solid rgba(255,255,255,.06); position: sticky; top: 64px; z-index: 100; backdrop-filter: blur(20px); }
        .pub-filters-inner { max-width: 1200px; margin: 0 auto; display: flex; gap: .6rem; flex-wrap: wrap; align-items: center; }
        .filter-btn { font-family: var(--ff-c); font-size: .64rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.45); border: 1px solid rgba(255,255,255,.1); background: transparent; border-radius: 100px; padding: 8px 18px; cursor: pointer; transition: all .3s var(--ease); }
        .filter-btn:hover { color: var(--white); border-color: rgba(255,255,255,.3); }
        .filter-btn.active { color: var(--ink); background: var(--gold); border-color: var(--gold); box-shadow: 0 4px 18px rgba(200,145,58,.35); }
        .pub-main { background: var(--ink); padding: 4rem 5vw 6rem; min-height: 60vh; }
        .pub-inner { max-width: 1200px; margin: 0 auto; }
        .pub-featured { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-radius: 22px; overflow: hidden; margin-bottom: 3rem; border: 1px solid rgba(255,255,255,.07); transition: border-color .4s, box-shadow .4s; cursor: pointer; }
        .pub-featured:hover { border-color: rgba(200,145,58,.25); box-shadow: 0 30px 80px rgba(0,0,0,.4); }
        .pub-featured-img { position: relative; overflow: hidden; min-height: 420px; background: var(--ocean); }
        .pub-featured-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .8s var(--ease); }
        .pub-featured:hover .pub-featured-img img { transform: scale(1.04); }
        .pub-featured-body { background: rgba(255,255,255,.03); padding: 3.5rem; display: flex; flex-direction: column; justify-content: space-between; }
        .pub-featured-label { font-family: var(--ff-c); font-size: .58rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); margin-bottom: .5rem; display: flex; align-items: center; gap: 8px; }
        .pub-featured-label::before { content: ''; width: 18px; height: 1px; background: var(--gold); }
        .pub-featured h2 { font-family: var(--ff-d); font-size: clamp(1.8rem, 2.8vw, 2.8rem); font-weight: 700; line-height: 1.1; color: var(--white); margin-bottom: 1.2rem; letter-spacing: -.01em; }
        .pub-featured p { font-family: var(--ff-b); font-size: .9rem; font-weight: 300; color: rgba(255,255,255,.55); line-height: 1.85; flex: 1; margin-bottom: 2rem; }
        .pub-featured-meta { display: flex; align-items: center; justify-content: space-between; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,.07); }
        .pub-meta-left { display: flex; flex-direction: column; gap: 3px; }
        .pub-author { font-family: var(--ff-c); font-size: .7rem; font-weight: 600; letter-spacing: .1em; color: var(--white); }
        .pub-date { font-family: var(--ff-c); font-size: .62rem; font-weight: 400; letter-spacing: .06em; color: rgba(255,255,255,.35); }
        .pub-read-btn { font-family: var(--ff-c); font-size: .66rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--ink); background: var(--gold); padding: 10px 22px; border-radius: 100px; transition: all .3s var(--ease); display: flex; align-items: center; gap: 8px; }
        .pub-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
        .pub-card { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07); border-radius: 18px; overflow: hidden; cursor: pointer; transition: all .45s var(--ease); display: flex; flex-direction: column; }
        .pub-card:hover { background: rgba(26,95,122,.2); border-color: rgba(200,145,58,.22); transform: translateY(-6px); box-shadow: 0 24px 60px rgba(0,0,0,.35); }
        .pub-card-img { position: relative; height: 200px; overflow: hidden; background: var(--ocean); flex-shrink: 0; }
        .pub-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .7s var(--ease); }
        .unit-badge { position: absolute; top: 1rem; left: 1rem; z-index: 2; font-family: var(--ff-c); font-size: .52rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; background: rgba(5,12,21,.85); color: var(--gold); border: 1px solid rgba(200,145,58,.3); padding: 5px 12px; border-radius: 100px; backdrop-filter: blur(8px); }
        .pub-card-body { padding: 1.8rem 1.8rem 1.6rem; flex: 1; display: flex; flex-direction: column; }
        .pub-card h3 { font-family: var(--ff-d); font-size: 1.32rem; font-weight: 700; color: var(--white); line-height: 1.2; margin-bottom: .8rem; letter-spacing: -.008em; transition: color .3s; }
        .pub-card:hover h3 { color: var(--gold-l); }
        .pub-card p { font-family: var(--ff-b); font-size: .8rem; font-weight: 300; color: rgba(255,255,255,.5); line-height: 1.8; flex: 1; margin-bottom: 1.4rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .pub-card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,.06); }
        .pub-card-meta { font-family: var(--ff-c); font-size: .6rem; font-weight: 400; letter-spacing: .06em; color: rgba(255,255,255,.3); }
        .pub-card-arrow { width: 30px; height: 30px; border-radius: 50%; border: 1px solid rgba(255,255,255,.12); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.35); transition: all .3s var(--ease); }
        .pub-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6rem 0; gap: 1.5rem; }
        .pub-spinner { width: 48px; height: 48px; border-radius: 50%; border: 1.5px solid rgba(200,145,58,.2); border-top-color: var(--gold); animation: spin .9s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media(max-width:900px){ .pub-featured { grid-template-columns: 1fr; } .pub-grid { grid-template-columns: repeat(2,1fr); } }
        @media(max-width:600px){ .pub-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav id="nav" class="dark">
    <a href="index.html" class="logo">
        <div class="logo-pill">
            <img src="https://maritime-affairs.eu/wp-content/uploads/2026/03/Logo-maritimes.jpg" alt="Maritime Affairs" style="height:44px;width:auto;display:block;">
            <div class="logo-text">
                <div class="logo-name">Maritime <em>Affairs</em></div>
                <span class="logo-sub">EU Blue Economy Do-Tank</span>
            </div>
        </div>
    </a>
    <ul class="nav-links">
        <li><a href="index.html#mission">Mission</a></li>
        <li><a href="index.html#units">Units</a></li>
        <li><a href="index.html#network">Network</a></li>
        <li><a href="publications.html" style="color:var(--gold)">Publications</a></li>
        <li><a href="index.html#contact">Join</a></li>
    </ul>
</nav>

<section class="pub-hero">
    <div class="pub-hero-inner">
        <div class="section-marker show" style="margin-bottom:1.5rem">Expert Knowledge</div>
        <h1>Our <em>Publications</em></h1>
        <p>Briefs, explainers and in-depth analysis from across the Blue Economy.</p>
    </div>
    <div class="pub-hero-count" id="hero-count">—</div>
</section>

<div class="pub-filters">
    <div class="pub-filters-inner">
        <button class="filter-btn active" data-unit="all">All</button>
        <button class="filter-btn" data-unit="Blue Policy & Law">Blue Policy & Law</button>
        <button class="filter-btn" data-unit="Blue Economy & Logistics">Blue Economy & Logistics</button>
        <button class="filter-btn" data-unit="Defense & Security">Defense & Security</button>
        <button class="filter-btn" data-unit="Tech, Energy & Resources">Tech, Energy & Resources</button>
    </div>
</div>

<main class="pub-main">
    <div class="pub-inner">
        <div id="featured-slot"></div>
        <div class="pub-grid" id="articles-grid"></div>
        <div class="pub-loading" id="loading-state">
            <div class="pub-spinner"></div>
            <p>Loading publications</p>
        </div>
        <div class="pub-empty" id="empty-state" style="display:none; text-align:center; padding:5rem;">
            <h3 style="color:white; opacity:0.5;">No articles found</h3>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // 1. Usa nomi diversi o assicurati che non ci siano duplicati
    const SB_URL = 'https://xuinnqoftizczzvkmzjg.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1aW5ucW9mdGl6Y3p6dmttempnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDAzNDQsImV4cCI6MjA5MTIxNjM0NH0.q-9me1peZF1lcNuzep_e-tNa2eQJAnwkYWQZ0f5lkU4';
    
    // Inizializziamo il client con un nome univoco per evitare errori di "already declared"
    const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);
    
    let allArticles = [];
    let currentFilter = 'all';

    async function loadArticles() {
        try {
            // Usiamo il nuovo nome della variabile supabaseClient
            const { data, error } = await supabaseClient
                .from('articles')
                .select('*')
                .eq('published', true)
                .order('published_at', { ascending: false });

            if (error) throw error;
            
            allArticles = data || [];
            console.log("Articoli caricati con successo:", allArticles.length);
            renderAll();
        } catch (err) {
            console.error('Errore durante il fetch:', err);
            document.getElementById('loading-state').innerHTML = '<p style="color:red">Connection Error</p>';
        }
    }

    function renderAll() {
        const loadingState = document.getElementById('loading-state');
        if (loadingState) loadingState.style.display = 'none';
        
        const filtered = currentFilter === 'all' 
            ? allArticles 
            : allArticles.filter(a => a.unit === currentFilter);

        const heroCount = document.getElementById('hero-count');
        if (heroCount) heroCount.textContent = filtered.length;

        if (filtered.length === 0) {
            document.getElementById('empty-state').style.display = 'block';
            document.getElementById('featured-slot').innerHTML = '';
            document.getElementById('articles-grid').innerHTML = '';
            return;
        }

        document.getElementById('empty-state').style.display = 'none';
        
        // Primo articolo (Featured)
        const featured = filtered[0];
        document.getElementById('featured-slot').innerHTML = `
            <div class="pub-featured" onclick="window.location.href='article.html?id=${featured.slug || featured.id}'">
                <div class="pub-featured-img">
                    <img src="${featured.image_url || ''}" alt="" onerror="this.parentElement.innerHTML='<div class=\'pub-featured-img-placeholder\'></div>'">
                </div>
                <div class="pub-featured-body">
                    <div class="pub-featured-label">${featured.unit || 'General'}</div>
                    <h2>${featured.title}</h2>
                    <p>${featured.summary || ''}</p>
                    <div class="pub-featured-meta">
                        <div class="pub-meta-left">
                            <span class="pub-author">${featured.author || 'Maritime Affairs'}</span>
                            <span class="pub-date">${new Date(featured.published_at).toLocaleDateString('en-GB')}</span>
                        </div>
                        <div class="pub-read-btn">Read Article</div>
                    </div>
                </div>
            </div>`;

        // Altri articoli (Grid)
        const rest = filtered.slice(1);
        document.getElementById('articles-grid').innerHTML = rest.map(a => `
            <div class="pub-card" onclick="window.location.href='article.html?id=${a.slug || a.id}'">
                <div class="pub-card-img">
                    <img src="${a.image_url || ''}" alt="">
                    <div class="unit-badge">${a.unit || 'General'}</div>
                </div>
                <div class="pub-card-body">
                    <h3>${a.title}</h3>
                    <p>${a.summary || ''}</p>
                    <div class="pub-card-footer">
                        <span class="pub-card-meta">${new Date(a.published_at).toLocaleDateString('en-GB')}</span>
                        <div class="pub-card-arrow">→</div>
                    </div>
                </div>
            </div>`).join('');
    }

    // Filtri
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.unit;
            renderAll();
        });
    });

    // Avvio
    loadArticles();
</script>

</body>
</html>
