<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/images/Logo-maritimes.png">
    <title>Publications — Maritime Affairs</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        body { background: var(--ink); cursor: none; margin: 0; overflow-x: hidden; }
        
        /* ── CURSORE ── */
        #compass-cursor { position: fixed; top: 0; left: 0; width: 56px; height: 56px; pointer-events: none; z-index: 10000; transform: translate(-50%, -50%); }
        #cursor-dot { position: fixed; width: 4px; height: 4px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 10001; transform: translate(-50%, -50%); }

        /* ── NAV (STILE INDEX) ── */
        #nav { 
            position: fixed; top: 0; left: 0; width: 100%; height: 80px; z-index: 1000; 
            background: rgba(5, 12, 21, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: space-between; padding: 0 5vw;
            box-sizing: border-box;
        }
        .nav-links { 
            display: flex; gap: 2.2rem; list-style: none; margin: 0; padding: 0;
            position: absolute; left: 50%; transform: translateX(-50%);
        }
        .nav-links li a { 
            font-family: var(--ff-c); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.15em; 
            text-transform: uppercase; text-decoration: none; color: var(--white); transition: 0.3s;
        }
        .nav-links li a:hover { color: var(--gold); }

        /* ── HERO ── */
        .pub-hero {
            min-height: 50vh; background: var(--deep); display: flex; align-items: flex-end;
            position: relative; overflow: hidden; padding: 0 5vw 6rem;
        }

        /* ── FILTRI FORMATTATI ── */
        .pub-filters {
            background: var(--ink); padding: 1.5rem 0; position: sticky; top: 80px; z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(20px);
        }
        .pub-filters-inner { 
            max-width: 1200px; margin: 0 auto; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
        }
        .filter-btn {
            font-family: var(--ff-c); font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; color: rgba(255,255,255,0.5); background: transparent;
            border: 1px solid rgba(255,255,255,0.1); padding: 10px 22px; border-radius: 100px;
            cursor: none; transition: all 0.3s ease;
        }
        .filter-btn:hover { border-color: var(--gold); color: white; }
        .filter-btn.active { background: var(--gold); color: var(--ink); border-color: var(--gold); box-shadow: 0 0 20px rgba(200,145,58,0.2); }

        /* ── CARDS ── */
        .pub-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; padding: 4rem 0; }
        .pub-card {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07);
            padding: 2.5rem; transition: 0.4s var(--ease); display: flex; flex-direction: column;
            height: 100%; box-sizing: border-box;
        }
        .pub-card:hover { border-color: var(--gold); transform: translateY(-5px); background: rgba(200,145,58,0.02); }
    </style>
</head>
<body>

<div id="compass-cursor">
    <svg viewBox="0 0 56 56" fill="none"><circle cx="28" cy="28" r="26" stroke="rgba(200,145,58,.35)" stroke-width="1"/><g class="needle"><polygon points="28,6 30.5,26 28,32 25.5,26" fill="rgba(200,145,58,.9)"/><polygon points="28,50 30.5,30 28,24 25.5,30" fill="rgba(255,255,255,.25)"/></g></svg>
</div>
<div id="cursor-dot"></div>

<nav id="nav">
    <a href="index.html" class="logo" style="text-decoration:none;">
        <div class="logo-pill">
            <img src="./assets/images/Logo-maritimes.png" alt="Maritime Affairs" style="height:44px;">
            <div class="logo-text">
                <div class="logo-name" style="color:white; font-family:var(--ff-d); font-size:1.1rem;">Maritime <em style="color:var(--gold); font-style:italic;">Affairs</em></div>
                <span class="logo-sub" style="color:rgba(255,255,255,0.4); font-family:var(--ff-c); font-size:0.6rem; text-transform:uppercase;">EU Blue Economy Do-Tank</span>
            </div>
        </div>
    </a>

    <ul class="nav-links">
        <li><a href="index.html#mission">Mission</a></li>
        <li><a href="index.html#units">Units</a></li>
        <li><a href="index.html#network">Network</a></li>
        <li><a href="publications.html" style="color:var(--gold)">Publications</a></li>
        <li><a href="index.html#contact">Join</a></li>
    </ul>

    <div class="nav-r">
        <a href="index.html#contact" class="nav-btn" style="background:var(--gold); color:var(--ink); padding:10px 22px; border-radius:100px; text-decoration:none; font-family:var(--ff-c); font-size:0.75rem; font-weight:800; text-transform:uppercase;">Join Us</a>
    </div>
</nav>

<section class="pub-hero">
    <div class="wrap" style="width: 100%;">
        <div class="section-marker show" style="color:var(--gold); font-family:var(--ff-c); text-transform:uppercase; letter-spacing:0.2em; font-size:0.7rem; margin-bottom:1rem;">Expert Knowledge</div>
        <h1 style="color:white; font-family:var(--ff-d); font-size:clamp(3rem, 8vw, 7rem); margin: 0;">Our <em>Publications</em></h1>
        <p class="body-text on-dark" style="max-width: 460px; opacity: 0.6; margin-top:1.5rem; font-family:var(--ff-b); line-height:1.8;">Strategic briefs, policy explainers and in-depth reports from the European maritime expert network.</p>
    </div>
    <div class="pub-hero-count" id="hero-count" style="position:absolute; bottom:4rem; right:5vw; font-family:var(--ff-d); font-size:6rem; color:rgba(200,145,58,0.08);">0</div>
</section>

<div class="pub-filters">
    <div class="wrap">
        <div class="pub-filters-inner">
            <button class="filter-btn active" data-unit="all">All Units</button>
            <button class="filter-btn" data-unit="Blue Policy & Law">Blue Policy & Law</button>
            <button class="filter-btn" data-unit="Blue Economy & Logistics">Blue Economy & Logistics</button>
            <button class="filter-btn" data-unit="Defense & Security">Defense & Security</button>
            <button class="filter-btn" data-unit="Tech, Energy & Resources">Tech, Energy & Resources</button>
        </div>
    </div>
</div>

<main class="pub-main">
    <div class="wrap">
        <div id="articles-grid" class="pub-grid"></div>
        <div id="loading-state" style="text-align: center; padding: 5rem 0;">
            <div class="pub-spinner" style="width:40px; height:40px; border:2px solid rgba(200,145,58,0.2); border-top-color:var(--gold); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 20px;"></div>
            <p style="font-family:var(--ff-c); color:var(--gold); text-transform:uppercase; letter-spacing:0.1em; font-size:0.7rem;">Syncing Maritime Database</p>
        </div>
    </div>
</main>

<script src="js/main.js"></script>
</body>
</html>
